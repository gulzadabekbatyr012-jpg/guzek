<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUJO BODRUM | Cabana System</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root {
            --lujo-orange: #FF6A00;
            --lujo-dark: #0f0f0f;
            --lujo-card: #1e1e1e;
            --white: #ffffff;
        }

        body {
            font-family: 'Avenir', 'Segoe UI', sans-serif;
            background-color: var(--lujo-dark);
            color: var(--white);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        /* Заголовок в стиле Lujo */
        header {
            text-align: center;
            padding: 50px 20px;
            width: 100%;
        }

        .logo {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .logo b { font-weight: 800; color: var(--lujo-orange); }

        .dev-tag {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #555;
        }

        /* Кнопки главного меню */
        .container {
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .zone-card {
            background: var(--lujo-card);
            border: 1px solid #333;
            padding: 30px;
            border-radius: 0; /* Минимализм — прямые линии или малый радиус */
            text-align: left;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }

        .zone-card:active { background: #252525; transform: scale(0.98); }

        .zone-card h2 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 3px;
            font-weight: 400;
        }

        .zone-card span {
            font-size: 12px;
            color: var(--lujo-orange);
            font-weight: 700;
        }

        .zone-card::after {
            content: '→';
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--lujo-orange);
            font-size: 20px;
        }

        /* Попап с сеткой */
        .popup {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn-close { font-size: 30px; color: var(--lujo-orange); cursor: pointer; }

        /* Сетка кабан */
        .grid {
            display: grid;
            gap: 8px;
            grid-template-columns: repeat(3, 1fr);
        }

        .cabana {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 700;
            color: #000;
            transition: 0.2s;
        }

        .cabana small { font-size: 8px; font-weight: normal; margin-top: 4px; text-transform: uppercase; }

        /* Цвета */
        .status-white { background: #fff; color: #000; }
        .status-red { background: #ff4b2b; color: #fff; }
        .status-yellow { background: #ffcc33; color: #000; }
        .status-blue { background: #007aff; color: #fff; }
        .status-purple { background: #a100ff; color: #fff; }

        /* Окно редактирования */
        .edit-sheet {
            display: none;
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: white;
            color: black;
            border-radius: 20px 20px 0 0;
            padding: 30px;
            box-sizing: border-box;
            z-index: 2000;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .edit-sheet h3 { margin: 0 0 20px 0; letter-spacing: 1px; }

        input, select, textarea {
            width: 100%; padding: 15px; margin-bottom: 12px;
            border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box;
        }

        .btn-save {
            background: var(--lujo-orange);
            color: white; border: none; width: 100%; padding: 18px;
            border-radius: 10px; font-weight: 800; text-transform: uppercase;
        }

        @media (min-width: 600px) {
            .grid { grid-template-columns: repeat(6, 1fr); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">LUJO <b>BODRUM</b></div>
        <div class="dev-tag">Booking System by Gulzada Bekbatyr</div>
    </header>

    <div class="container">
        <div class="zone-card" onclick="openPopup('escape')">
            <span>21 CABANAS</span>
            <h2>ESCAPE</h2>
        </div>
        <div class="zone-card" onclick="openPopup('lotus')">
            <span>8 CABANAS</span>
            <h2>LOTUS</h2>
        </div>
        <div class="zone-card" onclick="openPopup('joystone')">
            <span>18 CABANAS</span>
            <h2>JOYSTONE</h2>
        </div>
    </div>

    <div id="pop-escape" class="popup">
        <div class="popup-header"><h2>ESCAPE</h2><span class="btn-close" onclick="closePopup('escape')">✕</span></div>
        <div id="grid-escape" class="grid"></div>
    </div>

    <div id="pop-lotus" class="popup">
        <div class="popup-header"><h2>LOTUS</h2><span class="btn-close" onclick="closePopup('lotus')">✕</span></div>
        <div id="grid-lotus" class="grid"></div>
    </div>

    <div id="pop-joystone" class="popup">
        <div class="popup-header"><h2>JOYSTONE</h2><span class="btn-close" onclick="closePopup('joystone')">✕</span></div>
        <div id="grid-joystone" class="grid"></div>
    </div>

    <div id="editSheet" class="edit-sheet">
        <h3 id="editTitle">Cabana</h3>
        <select id="f-status">
            <option value="white">FREE (WHITE)</option>
            <option value="red">BOOKED (RED)</option>
            <option value="yellow">COMPLIMENTARY (YELLOW)</option>
            <option value="blue">EVENT (BLUE)</option>
            <option value="purple">VILLA (PURPLE)</option>
        </select>
        <input type="text" id="f-guest" placeholder="GUEST NAME">
        <input type="text" id="f-room" placeholder="ROOM NUMBER">
        <textarea id="f-comment" placeholder="COMMENT"></textarea>
        <button class="btn-save" onclick="saveToCloud()">SAVE CHANGES</button>
        <button onclick="closeEdit()" style="background:none; border:none; width:100%; margin-top:10px; color:gray;">CANCEL</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDrebkLoBp6dAvC8W1G6p-fM5Y7R_vF8o",
            authDomain: "cabana-booking-by-gulzada.firebaseapp.com",
            databaseURL: "https://cabana-booking-by-gulzada-default-rtdb.firebaseio.com",
            projectId: "cabana-booking-by-gulzada",
            storageBucket: "cabana-booking-by-gulzada.appspot.com",
            messagingSenderId: "646841996570",
            appId: "1:646841996570:web:b056e4c73df5607374b374"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let activeId = null;
        let localState = {};

        function build() {
            create('grid-escape', 21, 'E');
            create('grid-lotus', 8, 'L');
            create('grid-joystone', 18, 'J');
        }

        function create(gridId, n, p) {
            const g = document.getElementById(gridId);
            for(let i=1; i<=n; i++) {
                const id = p+i;
                const el = document.createElement('div');
                el.id = 'c-'+id;
                el.className = 'cabana status-white';
                el.onclick = () => openEdit(id);
                el.innerHTML = `<div>${id}</div><small id="g-${id}">-</small>`;
                g.appendChild(el);
                localState[id] = { status: 'white', guest: '' };
            }
        }

        function openPopup(id) { document.getElementById('pop-'+id).style.display = 'block'; }
        function closePopup(id) { document.getElementById('pop-'+id).style.display = 'none'; }
        
        function openEdit(id) {
            activeId = id;
            const d = localState[id];
            document.getElementById('editTitle').innerText = "CABANA " + id;
            document.getElementById('f-status').value = d.status || 'white';
            document.getElementById('f-guest').value = d.guest || '';
            document.getElementById('f-room').value = d.room || '';
            document.getElementById('f-comment').value = d.comment || '';
            document.getElementById('editSheet').style.display = 'block';
        }

        function closeEdit() { document.getElementById('editSheet').style.display = 'none'; }

        function saveToCloud() {
            const data = {
                status: document.getElementById('f-status').value,
                guest: document.getElementById('f-guest').value,
                room: document.getElementById('f-room').value,
                comment: document.getElementById('f-comment').value
            };
            db.ref('cabanas/' + activeId).set(data);
            closeEdit();
        }

        db.ref('cabanas/').on('value', (s) => {
            const val = s.val();
            if(val) {
                for(let id in val) {
                    localState[id] = val[id];
                    const el = document.getElementById('c-'+id);
                    const g = document.getElementById('g-'+id);
                    if(el) {
                        el.className = 'cabana status-' + val[id].status;
                        g.innerText = val[id].guest || '-';
                    }
                }
            }
        });

        build();
    </script>
</body>
</html>
