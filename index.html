<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guzek’s Secret Notes</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(#ffe6f3, #ffd2ea);
            background-size: cover;
            background-attachment: fixed;
            color: #7a4b63;
        }

        /* Маленькие цветочки по фону */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.imgur.com/dYcYQfV.png');
            opacity: 0.15;
            pointer-events: none;
        }

        .container {
            text-align: center;
            margin-top: 80px;
        }

        .title {
            font-size: 42px;
            color: #ff7fbf;
            text-shadow: 0 0 10px white;
        }

        .menu {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn {
            background: #ffc8e9;
            border: none;
            padding: 15px 30px;
            color: #7a4b63;
            border-radius: 12px;
            font-size: 20px;
            text-decoration: none;
            box-shadow: 0 0 10px #ffc8e9;
            width: 220px;
            text-align: center;
            cursor: pointer;
        }

        .page {
            padding: 20px;
            animation: fade 0.5s ease;
        }

        .hidden {
            display: none;
        }

        .subtitle {
            text-align: center;
            font-size: 30px;
            color: #ff9cc8;
            margin-bottom: 20px;
        }

        .form input, .form textarea {
            width: 95%;
            padding: 12px;
            margin-bottom: 12px;
            background: #ffe4f3;
            border: 1px solid #ffb1d6;
            border-radius: 10px;
        }

        textarea {
            min-height: 80px;
        }

        .bigNotes {
            width: 100%;
            height: 300px;
            background: #ffe4f3;
            border: 1px solid #ffb1d6;
            border-radius: 12px;
            padding: 12px;
        }

        .backBtn {
            background: #ffd6ec;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            display: block;
            margin: 20px auto;
            cursor: pointer;
        }

        #guestList {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .guestCard {
            background: #ffe7f2;
            padding: 15px;
            border: 1px solid #ffb1d6;
            border-radius: 12px;
            box-shadow: 0 0 8px #ffd6ec;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title">Guzek’s Secret Notes</h1>

        <div class="menu">
            <button onclick="showPage('guestsPage')" class="btn">Гости</button>
            <button onclick="showPage('addGuestPage')" class="btn">Добавить гостя</button>
            <button onclick="showPage('notesPage')" class="btn">Мои заметки</button>
        </div>
    </div>

    <!-- СТРАНИЦА ГОСТЕЙ -->
    <div id="guestsPage" class="page hidden">
        <h2 class="subtitle">Список гостей</h2>
        <div id="guestList"></div>
        <button class="backBtn" onclick="goHome()">Назад</button>
    </div>

    <!-- ДОБАВИТЬ ГОСТЯ -->
    <div id="addGuestPage" class="page hidden">
        <h2 class="subtitle">Добавить гостя</h2>
        <div class="form">
            <input id="room" placeholder="Номер комнаты">
            <input id="name" placeholder="Имя гостя">
            <input id="stay" placeholder="Период пребывания">
            <input id="cabana" placeholder="Тип кабаны">
            <textarea id="preferences" placeholder="Предпочтения"></textarea>
            <textarea id="notes" placeholder="Личные заметки"></textarea>
            <button class="btn" onclick="addGuest()">Сохранить</button>
        </div>
        <button class="backBtn" onclick="goHome()">Назад</button>
    </div>

    <!-- ЗАМЕТКИ -->
    <div id="notesPage" class="page hidden">
        <h2 class="subtitle">Мои секретные заметки</h2>
        <textarea id="myNotes" class="bigNotes" placeholder="Твои секреты, мысли, кто бесит, настроение..."></textarea>
        <button class="btn" onclick="saveMyNotes()">Сохранить</button>
        <button class="backBtn" onclick="goHome()">Назад</button>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function goHome() {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        }

        let guests = JSON.parse(localStorage.getItem("guests") || "[]");

        function addGuest() {
            const guest = {
                room: document.getElementById("room").value,
                name: document.getElementById("name").value,
                stay: document.getElementById("stay").value,
                cabana: document.getElementById("cabana").value,
                preferences: document.getElementById("preferences").value,
                notes: document.getElementById("notes").value
            };

            guests.push(guest);
            localStorage.setItem("guests", JSON.stringify(guests));

            alert("Гость добавлен 💗");
            renderGuests();
        }

        function renderGuests() {
            const list = document.getElementById("guestList");
            list.innerHTML = "";

            guests.forEach(g => {
                const card = document.createElement("div");
                card.className = "guestCard";
                card.innerHTML = `
                    <strong>Комната:</strong> ${g.room} <br>
                    <strong>Имя:</strong> ${g.name} <br>
                    <strong>Кабана:</strong> ${g.cabana} <br>
                    <strong>Заметки:</strong> ${g.notes}
                `;
                list.appendChild(card);
            });
        }

        renderGuests();

        // Заметки
        document.getElementById("myNotes").value =
            localStorage.getItem("myNotes") || "";

        function saveMyNotes() {
            localStorage.setItem("myNotes", document.getElementById("myNotes").value);
            alert("Заметки сохранены 💗");
        }
    </script>

</body>
</html>
