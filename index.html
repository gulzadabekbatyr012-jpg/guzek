<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guzek’s Secret Notes</title>

<!-- Подключаем красивый рукописный шрифт -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Roboto', sans-serif;
        background: linear-gradient(160deg, #ffe6f3, #ffd2ea);
        position: relative;
        color: #7a4b63;
    }

    /* Цветочные облака через CSS */
    body::before {
        content: "🌸 🌸 🌸 🌸 🌸 🌸 🌸 🌸";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        font-size: 50px;
        opacity: 0.08;
        pointer-events: none;
        white-space: pre;
    }

    .container {
        text-align: center;
        margin-top: 60px;
    }

    .title {
        font-family: 'Pacifico', cursive;
        font-size: 50px;
        color: #ff6fbf;
        text-shadow: 0 0 10px white;
    }

    .menu {
        margin-top: 30px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: center;
    }

    .btn {
        background: linear-gradient(145deg, #ffc0e8, #ffb3de);
        border: none;
        padding: 15px 35px;
        color: #7a4b63;
        border-radius: 15px;
        font-size: 22px;
        text-decoration: none;
        box-shadow: 0 5px 15px rgba(255,192,232,0.5);
        width: 240px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 20px rgba(255,192,232,0.7);
    }

    .page {
        padding: 20px;
        animation: fade 0.5s ease;
    }

    .hidden {
        display: none;
    }

    .subtitle {
        text-align: center;
        font-size: 32px;
        color: #ff8ac4;
        margin-bottom: 25px;
        font-family: 'Pacifico', cursive;
    }

    .form input, .form textarea {
        width: 95%;
        padding: 12px;
        margin-bottom: 15px;
        background: #ffe4f3;
        border: 1px solid #ffb1d6;
        border-radius: 12px;
        font-size: 16px;
    }

    textarea {
        min-height: 80px;
    }

    .bigNotes {
        width: 100%;
        height: 300px;
        background: #ffe4f3;
        border: 1px solid #ffb1d6;
        border-radius: 15px;
        padding: 12px;
        font-size: 16px;
    }

    .backBtn {
        background: linear-gradient(145deg, #ffd6f0, #ffc4e5);
        border: none;
        padding: 12px 25px;
        border-radius: 15px;
        display: block;
        margin: 20px auto;
        cursor: pointer;
        font-size: 18px;
        box-shadow: 0 4px 12px rgba(255,198,225,0.5);
        transition: all 0.3s ease;
    }

    .backBtn:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 18px rgba(255,198,225,0.7);
    }

    #guestList {
        display: flex;
        flex-direction: column;
        gap: 18px;
    }

    .guestCard {
        background: #ffe7f2;
        padding: 18px;
        border: 1px solid #ffb1d6;
        border-radius: 15px;
        box-shadow: 0 0 10px #ffd6ec;
        font-size: 16px;
    }
</style>
</head>

<body>
<div class="container">
    <h1 class="title">Guzek’s Secret Notes</h1>

    <div class="menu">
        <button onclick="showPage('guestsPage')" class="btn">Гости</button>
        <button onclick="showPage('addGuestPage')" class="btn">Добавить гостя</button>
        <button onclick="showPage('notesPage')" class="btn">Мои заметки</button>
    </div>
</div>

<div id="guestsPage" class="page hidden">
    <h2 class="subtitle">Список гостей</h2>
    <div id="guestList"></div>
    <button class="backBtn" onclick="goHome()">Назад</button>
</div>

<div id="addGuestPage" class="page hidden">
    <h2 class="subtitle">Добавить гостя</h2>
    <div class="form">
        <input id="room" placeholder="Номер комнаты">
        <input id="name" placeholder="Имя гостя">
        <input id="stay" placeholder="Период пребывания">
        <input id="cabana" placeholder="Тип кабаны">
        <textarea id="preferences" placeholder="Предпочтения"></textarea>
        <textarea id="notes" placeholder="Личные заметки"></textarea>
        <button class="btn" onclick="addGuest()">Сохранить</button>
    </div>
    <button class="backBtn" onclick="goHome()">Назад</button>
</div>

<div id="notesPage" class="page hidden">
    <h2 class="subtitle">Мои секретные заметки</h2>
    <textarea id="myNotes" class="bigNotes" placeholder="Твои секреты, мысли, кто бесит, настроение..."></textarea>
    <button class="btn" onclick="saveMyNotes()">Сохранить</button>
    <button class="backBtn" onclick="goHome()">Назад</button>
</div>

<script>
function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

function goHome() {
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
}

let guests = JSON.parse(localStorage.getItem("guests") || "[]");

function addGuest() {
    const guest = {
        room: document.getElementById("room").value,
        name: document.getElementById("name").value,
        stay: document.getElementById("stay").value,
        cabana: document.getElementById("cabana").value,
        preferences: document.getElementById("preferences").value,
        notes: document.getElementById("notes").value
    };
    guests.push(guest);
    localStorage.setItem("guests", JSON.stringify(guests));
    alert("Гость добавлен 💗");
    renderGuests();
}

function renderGuests() {
    const list = document.getElementById("guestList");
    list.innerHTML = "";
    guests.forEach(g => {
        const card = document.createElement("div");
        card.className = "guestCard";
        card.innerHTML = `<strong>Комната:</strong> ${g.room} <br>
                          <strong>Имя:</strong> ${g.name} <br>
                          <strong>Кабана:</strong> ${g.cabana} <br>
                          <strong>Заметки:</strong> ${g.notes}`;
        list.appendChild(card);
    });
}

renderGuests();

document.getElementById("myNotes").value = localStorage.getItem("myNotes") || "";

function saveMyNotes() {
    localStorage.setItem("myNotes", document.getElementById("myNotes").value);
    alert("Заметки сохранены 💗");
}
</script>
</body>
</html>
